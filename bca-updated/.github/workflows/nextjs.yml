name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://bca-auction-production.up.railway.app
          NEXT_PUBLIC_SOCKET_URL: https://bca-auction-production.up.railway.app

  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
